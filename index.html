<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Bảng kê đối soát</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://i.ibb.co/8b4MvV2/Black-Modern-Software-Programmer-Logo-2.png">
</head>
<body>
    <!-- Navigation Menu -->
    <nav class="nav-menu">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://i.ibb.co/8b4MvV2/Black-Modern-Software-Programmer-Logo-2.png" alt="Logo">
                <span>Hệ thống quản lý</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" data-page="bao-cao">Báo cáo</a></li>
                <li><a href="#" data-page="doi-soat" class="active">Đối soát</a></li>
                <li><a href="#" data-page="nhien-lieu">Nhiên liệu</a></li>
                <li><a href="#" data-page="phuong-tien">Phương tiện</a></li>
            </ul>
        </div>
    </nav>

    <div class="content-wrapper">
        <!-- Filter Section -->
        <div class="filter-section">
        <div class="filter-container">
            <div class="filter-item">
                <label for="plateSelect">Biển kiểm soát:</label>
                <select id="plateSelect" class="select-dropdown">
                    <option value="">-- Chọn biển số --</option>
                </select>
            </div>

            <div class="filter-item">
                <label for="customerSelect">Tên khách hàng:</label>
                <select id="customerSelect" class="select-dropdown">
                    <option value="">-- Chọn khách hàng --</option>
                </select>
            </div>

            <div class="filter-item">
                <label for="routeSelect">Loại tuyến:</label>
                <select id="routeSelect" class="select-dropdown">
                    <option value="">-- Chọn loại tuyến --</option>
                </select>
            </div>

            <div class="filter-item">
                <label for="fromDate">Từ ngày:</label>
                <input type="date" id="fromDate" class="date-input">
            </div>

            <div class="filter-item">
                <label for="toDate">Đến ngày:</label>
                <input type="date" id="toDate" class="date-input">
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="table-section">
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>Ngày tạo</th>
                        <th>Biển kiểm soát</th>
                        <th>Tên khách hàng</th>
                        <th>Loại tuyến</th>
                        <th style="width: 400px;">Chi tiết chuyến đi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be inserted here by JavaScript -->
                </tbody>
            </table>
        </div>

        <div id="noData" class="no-data" style="display: none;">
            <p>Không có dữ liệu phù hợp với bộ lọc</p>
        </div>

        <div class="pagination" id="pagination" style="display: none;">
            <div class="pagination-info">
                <span id="paginationInfo">Hiển thị 1-50 / 100 chuyến</span>
            </div>
            <div class="pagination-controls">
                <button class="pagination-btn" id="prevBtn">← Trước</button>
                <span class="page-number">Trang <span id="currentPage">1</span> / <span id="totalPages">1</span></span>
                <button class="pagination-btn" id="nextBtn">Sau →</button>
            </div>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
